name: security / no-dotenv

on:
  pull_request:

permissions:
  contents: read

jobs:
  block-dotenv:
    name: Check for secrets in .env
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Block .env files
        run: |
          DOTENV_FILES=$(git ls-files | grep -E '(^|/)\.env(\..+)?$' || true)
          if [ -n "$DOTENV_FILES" ]; then
            echo "::error::Security violation: The following .env files were found in the repository: $DOTENV_FILES"
            exit 1
          fi

