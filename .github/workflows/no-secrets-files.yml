name: security / no-dotenv

on:
  pull_request:

permissions:
  contents: read

jobs:
  block-dotenv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Block .env files
        run: |
          if git ls-files | grep -E '(^|/)\.env(\.|$)'; then
            echo "::error::.env files must not be committed"
            exit 1
          fi
