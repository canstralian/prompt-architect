name: ci / contract-files

on:
  pull_request:

permissions:
  contents: read

jobs:
  required-files:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Ensure governance + contracts exist
        run: |
          required=(
            "README.md"
            "CONTRIBUTING.md"
            "SECURITY.md"
            ".github/copilot-instructions.md"
            "AGENTS.md"
            "CLAUDE.md"
            "GEMINI.md"
          )
          missing=0
          for f in "${required[@]}"; do
            if [ ! -f "$f" ]; then
              echo "::error::Missing required file: $f"
              missing=1
            fi
          done
          exit $missing
